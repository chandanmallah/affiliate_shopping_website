{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Affiliate Link Converter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap">
  <link rel="stylesheet" href="{% static 'products/css/styles.css' %}">

  <style>
    .cv-wrap { max-width: 760px; margin: 2.5rem auto; padding: 0 1rem; }
    .cv-card { background:#fff; border:1px solid rgba(17,24,39,.08); border-radius:20px; padding:2rem 2.25rem; box-shadow:0 12px 30px rgba(17,24,39,.08); }
    .cv-head { text-align:center; margin-bottom:1.5rem; }
    .cv-head h1 { margin:0; font-size:2rem; line-height:1.1; }
    .cv-head p { margin:.4rem 0 0; color:#6b7280; font-size:.92rem; }
    .form-group { margin-bottom:1.15rem; }
    .form-group label { display:block; font-size:.85rem; font-weight:600; color:#374151; margin-bottom:.4rem; }
    .cv-field { width:100%; padding:.75rem .9rem; font:inherit; color:#111827; background:#fff; border:1px solid #d7dbe2; border-radius:12px; }
    .cv-field:focus { outline:none; border-color:#ff4a7a; box-shadow:0 0 0 3px rgba(255,74,122,.15); }
    textarea.cv-field { min-height: 200px; resize: vertical; line-height:1.5; font-family: ui-monospace, Menlo, Consolas, monospace; font-size:.85rem; }
    .cv-submit { width:100%; margin-top:.5rem; padding:.95rem 1rem; font:600 1rem/1 inherit; color:#fff; background:#ff4a7a; border:none; border-radius:12px; cursor:pointer; }
    .cv-submit:hover { transform:translateY(-1px); box-shadow:0 8px 18px rgba(255,74,122,.35); }
    .cv-submit:disabled { opacity:.65; cursor:default; transform:none; box-shadow:none; }

    .cv-radio-row { display:flex; gap:.75rem; flex-wrap:wrap; }
    .cv-radio { flex:1; min-width:200px; display:flex; gap:.6rem; align-items:flex-start; border:1px solid #d7dbe2; border-radius:12px; padding:.75rem .9rem; cursor:pointer; }
    .cv-radio input { margin-top:.2rem; }
    .cv-radio .rt { font-weight:600; color:#111827; font-size:.9rem; }
    .cv-radio .rd { font-size:.74rem; color:#6b7280; margin-top:.15rem; }
    .cv-radio.sel { border-color:#ff4a7a; box-shadow:0 0 0 2px rgba(255,74,122,.12); }

    .cv-result { margin-top:1.75rem; display:none; }
    .cv-result.show { display:block; }
    .cv-error { margin-top:1.5rem; padding:.9rem 1rem; border-radius:12px; background:#fdecef; color:#c0294a; border:1px solid #f4c6d1; display:none; }
    .cv-error.show { display:block; }

    .cv-bar { display:flex; align-items:center; justify-content:space-between; gap:.5rem; margin:.25rem 0 .5rem; }
    .cv-summary { font-size:.85rem; color:#374151; font-weight:600; }
    .cv-copy { padding:.55rem 1rem; border:none; border-radius:10px; background:#1f4e79; color:#fff; font-weight:600; cursor:pointer; white-space:nowrap; }
    .cv-copy:hover { background:#163a5c; }
    textarea#outMsg { min-height: 220px; background:#f7f8fa; }

    .cv-warn { margin-top:1rem; font-size:.8rem; color:#b45309; background:#fff7ed; border:1px solid #fcd9a8; border-radius:10px; padding:.7rem .9rem; }
    .cv-warn ul { margin:.4rem 0 0; padding-left:1.1rem; }
    .cv-hint { font-size:.72rem; color:#9aa0aa; margin-top:.3rem; }
  </style>
</head>
<body>
  <div class="cv-wrap">
    <div class="cv-card glass-panel shadow-soft">
      <div class="cv-head">
        <h1 class="font-display">Affiliate Link Converter</h1>
        <p>Paste a message (or a single URL). Every Amazon link is re-tagged; everything else is left as-is.</p>
      </div>

      {% csrf_token %}

      <form id="convertForm">
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" class="cv-field" placeholder="Paste your full deal message here…" required></textarea>
          <p class="cv-hint">Amazon links (incl. amzn.to short links) get converted. Codes, form links and formatting stay the same.</p>
        </div>

        <div class="form-group">
          <label for="bot">Affiliate Bot</label>
          <select id="bot" class="cv-field">
            {% for name in bots %}
              <option value="{{ name }}" {% if name == default_bot %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
          </select>
        </div>

        <button type="submit" id="convertBtn" class="cv-submit cta-btn">Convert Message</button>
      </form>

      <div id="error" class="cv-error"></div>

      <div id="result" class="cv-result">
        <div class="cv-bar">
          <span class="cv-summary" id="summary"></span>
          <button type="button" class="cv-copy" id="copyBtn">Copy message</button>
        </div>
        <textarea id="outMsg" class="cv-field" readonly></textarea>
        <div id="warn" class="cv-warn" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    function getCSRFToken() {
      for (let c of document.cookie.split(';')) {
        c = c.trim();
        if (c.startsWith('csrftoken=')) return decodeURIComponent(c.substring(10));
      }
      return '';
    }

    const form = document.getElementById('convertForm');
    const btn = document.getElementById('convertBtn');
    const errEl = document.getElementById('error');
    const resEl = document.getElementById('result');

    const botSel = document.getElementById('bot');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errEl.className = 'cv-error';
      resEl.className = 'cv-result';
      btn.disabled = true;
      btn.textContent = 'Converting…';

      try {
        const res = await fetch('/api/convert-message/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
          body: JSON.stringify({
            message: document.getElementById('message').value,
            bot: botSel.value,
            link_type: 'page'
          })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = '✗ ' + (data.error || 'Conversion failed.');
          errEl.className = 'cv-error show';
          return;
        }

        document.getElementById('outMsg').value = data.converted_message;
        document.getElementById('summary').textContent =
          data.converted_count + ' link' + (data.converted_count === 1 ? '' : 's') + ' converted';

        const warn = document.getElementById('warn');
        if (data.errors && data.errors.length) {
          warn.style.display = 'block';
          warn.innerHTML = '<strong>' + data.errors.length + ' link(s) could not be converted (left unchanged):</strong><ul>' +
            data.errors.map(e => '<li>' + e.url + ' — ' + e.reason + '</li>').join('') + '</ul>';
        } else {
          warn.style.display = 'none';
        }

        resEl.className = 'cv-result show';
      } catch (err) {
        errEl.textContent = '✗ Something went wrong. Check the server logs.';
        errEl.className = 'cv-error show';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Convert Message';
      }
    });

    document.getElementById('copyBtn').addEventListener('click', function () {
      const out = document.getElementById('outMsg');
      out.select();
      navigator.clipboard.writeText(out.value).then(() => {
        this.textContent = 'Copied!';
        setTimeout(() => { this.textContent = 'Copy message'; }, 1500);
      });
    });
  </script>
</body>
</html>
