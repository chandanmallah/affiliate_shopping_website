{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product — DEAL HUNT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap">

  <!-- Universal site stylesheet (same one product_list.html uses) -->
  <link rel="stylesheet" href="{% static 'products/css/styles.css' %}">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HXD0PPQM64"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HXD0PPQM64');
  </script>

  <!-- Page-scoped layout only. Colours/fonts inherit from styles.css.
       Falls back gracefully if a class below is not defined in styles.css. -->
  <style>
    .ap-wrap { max-width: 720px; margin: 2.5rem auto; padding: 0 1rem; }
    .ap-card {
      background: #fff;
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 20px;
      padding: 2rem 2.25rem;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }
    .ap-head { text-align: center; margin-bottom: 1.75rem; }
    .ap-head h1 { margin: 0; font-size: 2rem; line-height: 1.1; }
    .ap-head p { margin: .4rem 0 0; color: #6b7280; font-size: .92rem; }

    .ap-progress { height: 4px; background: #eef0f4; border-radius: 999px; overflow: hidden; margin: 1.25rem 0 1.75rem; }
    .ap-progress > span { display: block; height: 100%; width: 0; background: #ff4a7a; transition: width .3s ease; }

    .ap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 560px) { .ap-grid { grid-template-columns: 1fr; } }

    .form-group { margin-bottom: 1.15rem; }
    .form-group label { display: block; font-size: .85rem; font-weight: 600; color: #374151; margin-bottom: .4rem; }

    /* Inherit the site's input look; provide a matching fallback. */
    .ap-field {
      width: 100%;
      padding: .75rem .9rem;
      font: inherit;
      color: #111827;
      background: #fff;
      border: 1px solid #d7dbe2;
      border-radius: 12px;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .ap-field:focus { outline: none; border-color: #ff4a7a; box-shadow: 0 0 0 3px rgba(255, 74, 122, 0.15); }
    textarea.ap-field { min-height: 96px; resize: vertical; }
    select.ap-field { appearance: none; -webkit-appearance: none; background-image: linear-gradient(45deg, transparent 50%, #9aa0aa 50%), linear-gradient(135deg, #9aa0aa 50%, transparent 50%); background-position: calc(100% - 18px) 1.15rem, calc(100% - 13px) 1.15rem; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; }

    .ap-submit {
      width: 100%;
      margin-top: 1rem;
      padding: .95rem 1rem;
      font: 600 1rem/1 inherit;
      color: #fff;
      background: #ff4a7a;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }
    .ap-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(255, 74, 122, 0.35); }
    .ap-submit:disabled { opacity: .65; cursor: default; transform: none; box-shadow: none; }

    .ap-msg .success { margin-top: 1.25rem; padding: .9rem 1rem; border-radius: 12px; background: #e8f7ee; color: #1b7a43; border: 1px solid #bfe6cd; }
    .ap-msg .error   { margin-top: 1.25rem; padding: .9rem 1rem; border-radius: 12px; background: #fdecef; color: #c0294a; border: 1px solid #f4c6d1; }

    .ap-back { display: inline-block; margin-bottom: 1rem; color: #6b7280; text-decoration: none; font-size: .9rem; }
    .ap-back:hover { color: #111827; }
    .ap-hint { font-size: .72rem; color: #9aa0aa; margin-top: .3rem; }
  </style>
</head>
<body>
  <div class="ap-wrap">
    <a href="/" class="ap-back">&larr; Back to deals</a>

    <div class="ap-card glass-panel shadow-soft">
      <div class="ap-head">
        <h1 class="font-display">Add a New Product</h1>
        <p>Add an Amazon, Flipkart, Myntra or Ajio offer to the homepage.</p>
      </div>

      <div class="ap-progress"><span id="progressBar"></span></div>

      <form id="productForm">
        <div class="ap-grid">
          <div class="form-group">
            <label for="source">Marketplace / Source</label>
            <select id="source" class="ap-field">
              <option value="amazon">Amazon</option>
              <option value="flipkart">Flipkart</option>
              <option value="myntra">Myntra</option>
              <option value="ajio">Ajio</option>
            </select>
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" class="ap-field">
              <option value="">— Select category —</option>
              <option>Baby</option>
              <option>Beauty</option>
              <option>Books</option>
              <option>Car &amp; Motorbike</option>
              <option>Clothing &amp; Accessories</option>
              <option>Collectibles</option>
              <option>Computers &amp; Accessories</option>
              <option>Deals</option>
              <option>Electronics</option>
              <option>Furniture</option>
            </select>
            <p class="ap-hint">Drives the homepage category-strip filter.</p>
          </div>
        </div>

        <div class="form-group">
          <label for="product_url">Product URL</label>
          <input type="url" id="product_url" class="ap-field" required>
        </div>

        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" class="ap-field" required>
        </div>

        <div class="ap-grid">
          <div class="form-group">
            <label for="price_display">Price (e.g. &#8377;1,299.00)</label>
            <input type="text" id="price_display" class="ap-field">
          </div>
          <div class="form-group">
            <label for="mrp_display">MRP (e.g. &#8377;2,999.00)</label>
            <input type="text" id="mrp_display" class="ap-field">
          </div>
        </div>

        <div class="form-group">
          <label for="image_url">Image URL</label>
          <input type="url" id="image_url" class="ap-field">
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" class="ap-field"></textarea>
        </div>

        <button type="submit" id="submitBtn" class="ap-submit cta-btn">Add Product</button>
      </form>

      <div id="message" class="ap-msg"></div>
    </div>
  </div>

  <script>
    const formInputs = document.querySelectorAll('#productForm input, #productForm textarea, #productForm select');
    const progressBar = document.getElementById('progressBar');
    const submitBtn = document.getElementById('submitBtn');

    function updateProgress() {
      let filled = 0;
      formInputs.forEach(el => { if (el.value.trim() !== '') filled++; });
      progressBar.style.width = ((filled / formInputs.length) * 100) + '%';
    }
    formInputs.forEach(el => el.addEventListener('input', updateProgress));
    formInputs.forEach(el => el.addEventListener('change', updateProgress));

    document.getElementById('productForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Processing...';

      const data = {
        link: {
          product_url: document.getElementById('product_url').value,
          title: document.getElementById('title').value
        },
        source: document.getElementById('source').value,
        category: document.getElementById('category').value,
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        image_url: document.getElementById('image_url').value,
        price_display: document.getElementById('price_display').value,
        mrp_display: document.getElementById('mrp_display').value
      };

      try {
        const response = await fetch('/api/products/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
          body: JSON.stringify(data)
        });
        const message = document.getElementById('message');
        if (response.ok) {
          message.innerHTML = '<p class="success">&#10003; Product added successfully!</p>';
          document.getElementById('productForm').reset();
          progressBar.style.width = '0%';
        } else {
          const errorData = await response.json();
          message.innerHTML = '<p class="error">&#10007; Error: ' + JSON.stringify(errorData) + '</p>';
        }
      } catch (err) {
        document.getElementById('message').innerHTML = '<p class="error">&#10007; Something went wrong.</p>';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add Product';
      }
    });

    function getCSRFToken() {
      const cookies = document.cookie.split(';');
      for (let c of cookies) {
        c = c.trim();
        if (c.startsWith('csrftoken=')) return decodeURIComponent(c.substring(10));
      }
      return '';
    }
  </script>
</body>
</html>
